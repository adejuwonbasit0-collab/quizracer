version: '3.9'

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: qr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-quizracer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quizracer_dev_pass}
      POSTGRES_DB:       ${POSTGRES_DB:-quizracer}
      PGDATA:            /var/lib/postgresql/data/pgdata
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-quizracer} -d ${POSTGRES_DB:-quizracer}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - quizracer

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: qr_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-quizracer_redis_pass}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--no-auth-warning', '-a', '${REDIS_PASSWORD:-quizracer_redis_pass}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quizracer

  # ── pgAdmin (optional dev tool) ──────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: qr_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@quizracer.io
      PGADMIN_DEFAULT_PASSWORD: pgadmin_dev
      PGADMIN_LISTEN_PORT:      5050
    ports:
      - '5050:5050'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - quizracer
    profiles:
      - tools

  # ── Redis Commander (optional dev tool) ──────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: qr_redis_commander
    restart: unless-stopped
    environment:
      REDIS_HOST:     redis
      REDIS_PORT:     6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-quizracer_redis_pass}
    ports:
      - '8081:8081'
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - quizracer
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  quizracer:
    driver: bridge
