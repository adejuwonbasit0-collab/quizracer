version: '3.9'

services:
  # ── API Backend ─────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: ../../infrastructure/docker/Dockerfile.api
      args:
        NODE_ENV: production
    container_name: qr_api
    restart: unless-stopped
    env_file: ./apps/api/.env.production
    environment:
      NODE_ENV: production
      PORT: 4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '4000:4000'
    volumes:
      - api_logs:/app/logs
      - api_uploads:/app/uploads
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:4000/api/health/live']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - quizracer
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          memory: 512M

  # ── Web Frontend ────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: ../../infrastructure/docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.quizracer.io}
        NEXT_PUBLIC_WS_URL:  ${NEXT_PUBLIC_WS_URL:-wss://api.quizracer.io}
    container_name: qr_web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - '3000:3000'
    depends_on:
      api:
        condition: service_healthy
    networks:
      - quizracer
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ── Nginx Reverse Proxy ──────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: qr_nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_certs:/etc/nginx/certs
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
      - web
    networks:
      - quizracer

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: qr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-quizracer}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-quizracer}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - quizracer
    deploy:
      resources:
        limits:
          memory: 2G

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: qr_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--no-auth-warning', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - quizracer
    deploy:
      resources:
        limits:
          memory: 768M

volumes:
  postgres_data:
  redis_data:
  api_logs:
  api_uploads:
  nginx_certs:
  nginx_logs:

networks:
  quizracer:
    driver: bridge
